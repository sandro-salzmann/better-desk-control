name: CI

# Always verify the build; additionally sign and publish updater artifacts when
# a version tag is pushed. Tag the commit you want to ship, e.g.
# `git tag v0.1.0 && git push origin v0.1.0`.
on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Always run the full CI suite. The release job gates on this succeeding.
  ci:
    name: Verify + build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Least-privilege: read-only checkout is all this job needs.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      # Official Tauri Linux deps, plus libdbus-1-dev for btleplug (BLE over D-Bus).
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libdbus-1-dev

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Install Rust toolchain
        run: rustup toolchain install

      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Verify
        run: yarn verify

      - name: Build
        run: yarn tauri build

  release:
    needs: ci
    # Only build, sign, and publish artifacts when a version tag was pushed.
    # On branch pushes and PRs this job is skipped and only `ci` runs.
    if: startsWith(github.ref, 'refs/tags/v')
    name: Release Windows
    # tauri-action needs write access to create the GitHub Release and upload assets.
    permissions:
      contents: write
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Install Rust toolchain
        run: rustup toolchain install

      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Better Desk Control ${{ github.ref_name }}
          releaseBody: See the assets below to download and install this version.
          releaseDraft: false
          prerelease: false
          # The release overlay flips on createUpdaterArtifacts so only signed
          # release builds emit updater bundles + .sig files.
          args: --config src-tauri/tauri.release.conf.json

      # The headless CLI is not part of the Tauri bundle, so build and attach it
      # to the release that tauri-action just published.
      - name: Build desk-cli
        run: yarn build:cli

      - name: Attach desk-cli to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.ref_name }} target/release/desk-cli.exe --clobber
